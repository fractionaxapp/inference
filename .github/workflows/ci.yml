name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# This service depends on the monorepo's moon/uv toolchain wiring, so CI runs it
# inside the fractionaxapp meta-monorepo. It is nested: fractionaxapp → ai (umbrella)
# → inference (this repo), mounted at ai/inference. Cross-repo access uses the shared
# GitHub App; the App ID is inlined and only the private key is a secret.
jobs:
  ci:
    name: Lint, format, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Mint a cross-repo token from the GitHub App
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: "4090077"
          private-key: ${{ secrets.MONOREPO_APP_PRIVATE_KEY }}
          owner: fractionaxapp
          repositories: |
            fractionaxapp
            ai
            inference

      - name: Check out meta-monorepo
        uses: actions/checkout@v5
        with:
          repository: fractionaxapp/fractionaxapp
          submodules: recursive
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Check out the triggering inference commit
        run: |
          cd ai/inference
          git fetch origin "${INFERENCE_SHA}"
          git checkout "${INFERENCE_SHA}"
        env:
          INFERENCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install proto toolchains
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Restore moon and dependency caches
        uses: actions/cache@v4
        with:
          path: |
            .moon/cache
            ~/.cache/uv
          key: ci-${{ runner.os }}-${{ hashFiles('ai/inference/uv.lock') }}
          restore-keys: |
            ci-${{ runner.os }}-

      - name: Run inference quality gates
        run: moon run inference:lint inference:format inference:typecheck inference:test
